{% extends 'reservations/base.html' %}
{% block title %}
  Register — SkyBook
{% endblock %}

{% block content %}
  <div class="row justify-content-center">
    <div class="col-md-7 col-lg-6">
      <div class="card p-4 p-md-5">
        <h3 class="fw-bold mb-1">Create your account</h3>
        <p class="text-muted mb-4">
          Already have one?
          <a href="{% url 'login' %}">Log in</a>
        </p>

        <form method="POST">
          {% csrf_token %}

          <div class="row g-3">
            <div class="col-6">
              <label class="form-label fw-semibold">First Name</label>
              <input type="text" name="first_name" class="form-control" placeholder="Ravi" required />
            </div>

            <div class="col-6">
              <label class="form-label fw-semibold">Last Name</label>
              <input type="text" name="last_name" class="form-control" placeholder="Sharma" required />
            </div>

            <div class="col-12">
              <label class="form-label fw-semibold">Email</label>
              <input type="email" name="email" class="form-control" placeholder="ravi@email.com" required />
            </div>

            <div class="col-12">
              <label class="form-label fw-semibold">Password</label>
              <input type="password" name="password" class="form-control" placeholder="Min. 8 characters" required />
            </div>

            <div class="col-12">
              <label class="form-label fw-semibold">Phone Number</label>
              <input type="tel" name="phone" class="form-control" placeholder="9876543210" required />
            </div>

            <div class="col-md-6">
              <label class="form-label fw-semibold">Passport Number</label>
              <input type="text" name="passport_no" class="form-control" placeholder="A1234567" required />
            </div>

            <div class="col-md-6">
              <label class="form-label fw-semibold">Date of Birth</label>
              <input type="date" name="dob" class="form-control" required />
            </div>

            <div class="col-12 mt-2">
              <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold">Create Account</button>
            </div>
          </div>
        </form>
      </div>
    </div>
  </div>
{% endblock %}
